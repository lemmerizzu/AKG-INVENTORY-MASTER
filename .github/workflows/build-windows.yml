name: Build Windows Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: akg_inventory_master

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: dart analyze lib

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package artifact
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "AKG-Master-Windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AKG-Master-Windows
          path: akg_inventory_master/AKG-Master-Windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: akg_inventory_master/AKG-Master-Windows.zip
          generate_release_notes: true
